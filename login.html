<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title class="tenant-title">Sign In</title>
    <meta name="description" content="Partner Sign In">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #222222;
            --primary-hover: #333333;
            --bg-color: #f5f5f5;
            --card-bg: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto', system-ui, -apple-system, sans-serif;
            background: var(--bg-color);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .login-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }

        .tenant-logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 24px;
            border-radius: 12px;
            object-fit: contain;
        }

        .tenant-name {
            text-align: center;
            font-size: 24px;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 8px;
        }

        .tenant-subtitle {
            text-align: center;
            font-size: 14px;
            color: #666;
            margin-bottom: 32px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #333;
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            transition: all 0.2s;
            background: #fafafa;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary);
            background: #fff;
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
        }

        .input-with-icon {
            padding-left: 44px;
        }

        .password-toggle {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
            cursor: pointer;
            transition: color 0.2s;
        }

        .password-toggle:hover {
            color: var(--primary);
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            font-size: 13px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #666;
            cursor: pointer;
        }

        .remember-me input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: var(--primary);
        }

        .forgot-password {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
        }

        .forgot-password:hover {
            text-decoration: underline;
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-login:hover {
            background: var(--primary-hover);
        }

        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-login.loading .btn-text {
            opacity: 0.7;
        }

        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        .btn-login.loading .spinner {
            display: block;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-message {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #dc2626;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 20px;
            display: none;
            align-items: center;
            gap: 8px;
        }

        .error-message.show {
            display: flex;
        }

        .back-link {
            text-align: center;
            margin-top: 24px;
        }

        .back-link a {
            color: #666;
            text-decoration: none;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: color 0.2s;
        }

        .back-link a:hover {
            color: var(--primary);
        }

        .powered-by {
            text-align: center;
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid #eee;
        }

        .powered-by-text {
            font-size: 12px;
            color: #999;
        }

        .powered-by-brand {
            font-size: 14px;
            font-weight: 600;
            color: var(--primary);
            margin-top: 4px;
        }

        /* Loading overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255,255,255,0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }

        .loading-overlay.show {
            opacity: 1;
            visibility: visible;
        }

        .loading-content {
            text-align: center;
        }

        .loading-spinner {
            width: 48px;
            height: 48px;
            border: 3px solid #eee;
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }

        .loading-text {
            color: #666;
            font-size: 14px;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .login-card {
                padding: 32px 24px;
            }
        }
    </style>
</head>
<body>
    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-content">
            <div class="loading-spinner"></div>
            <p class="loading-text">Loading...</p>
        </div>
    </div>

    <div class="login-container">
        <div class="login-card">
            <!-- Tenant Logo -->
            <img src="" alt="Logo" class="tenant-logo" id="tenantLogo">
            
            <!-- Tenant Name -->
            <h1 class="tenant-name" id="tenantName">Loading...</h1>
            <p class="tenant-subtitle" id="tenantSubtitle">Partner Sign In</p>

            <!-- Error Message -->
            <div class="error-message" id="errorMessage">
                <i class="fas fa-exclamation-circle"></i>
                <span id="errorText"></span>
            </div>

            <!-- Login Form -->
            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label" for="companySelect">Company Name / ID</label>
                    <div class="input-wrapper">
                        <i class="fas fa-building input-icon"></i>
                        <select 
                            id="companySelect" 
                            class="form-input input-with-icon"
                            style="appearance:none;-webkit-appearance:none;background-image:url('data:image/svg+xml;charset=UTF-8,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%2212%22 height=%2212%22 viewBox=%220 0 24 24%22 fill=%22none%22 stroke=%22%239ca3af%22 stroke-width=%222%22%3E%3Cpath d=%22M6 9l6 6 6-6%22/%3E%3C/svg%3E');background-repeat:no-repeat;background-position:right 14px center;background-size:14px;padding-right:36px;cursor:pointer;"
                        >
                            <option value="default">Greenscape Builders</option>
                            <option value="omeya-sin">Omeya-SIN</option>
                            <option value="nestopia-chn">Nestopia-CHN</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="email">Email Address</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope input-icon"></i>
                        <input 
                            type="email" 
                            id="email" 
                            class="form-input input-with-icon" 
                            placeholder="yourname@ai-nestopia.com"
                            required
                            autocomplete="email"
                        >
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Passcode</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock input-icon"></i>
                        <input 
                            type="password" 
                            id="password" 
                            class="form-input input-with-icon" 
                            placeholder="Enter your passcode"
                            required
                            autocomplete="current-password"
                        >
                        <i class="fas fa-eye password-toggle" id="togglePassword"></i>
                    </div>
                </div>

                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" id="rememberMe">
                        <span>Remember me</span>
                    </label>
                    <a href="#" class="forgot-password" id="forgotPassword">Forgot passcode?</a>
                </div>

                <button type="submit" class="btn-login" id="loginBtn">
                    <div class="spinner"></div>
                    <span class="btn-text">Sign In</span>
                </button>
            </form>

            <div class="back-link">
                <a href="index.html">
                    <i class="fas fa-arrow-left"></i>
                    <span>Back to Home</span>
                </a>
            </div>

            <div class="powered-by">
                <p class="powered-by-text">Powered by</p>
                <p class="powered-by-brand">Nestopia AI Platform</p>
            </div>
        </div>
    </div>

    <script>
        // Tenant Configuration
        let currentTenant = null;

        // Extract tenant slug from URL
        function getTenantSlug() {
            const hostname = window.location.hostname;
            const path = window.location.pathname;
            
            // Subdomain: partner1.nestopia.com
            // Skip platform hosts like *.pages.dev, *.vercel.app, *.netlify.app, localhost
            const platformHosts = ['pages.dev', 'vercel.app', 'netlify.app', 'workers.dev', 'localhost', '127.0.0.1'];
            const isPlatformHost = platformHosts.some(function(h) { return hostname.endsWith(h); });
            if (!isPlatformHost && hostname.includes('.') && !hostname.startsWith('www.')) {
                const parts = hostname.split('.');
                if (parts.length >= 3) {
                    return parts[0];
                }
            }
            
            // Path-based: nestopia.com/login/partner1
            const pathMatch = path.match(/\/login\/([^\/]+)/);
            if (pathMatch) {
                return pathMatch[1];
            }
            
            // Query param: ?tenant=partner1
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('tenant') || 'default';
        }

        // Load tenant configuration
        async function loadTenantConfig(overrideSlug) {
            const slug = overrideSlug || getTenantSlug();
            
            try {
                // In production, this would be an API call
                // const response = await fetch(`/api/tenant?slug=${slug}`);
                // const tenant = await response.json();
                
                // For demo, using mock data
                const tenants = {
                    'partner1': {
                        name: 'Greenscape Builders',
                        slug: 'partner1',
                        logo: 'images/partner-logo.png',
                        primaryColor: '#222222',
                        subtitle: 'Professional Outdoor Living Solutions'
                    },
                    'partner2': {
                        name: 'Green Garden Design',
                        slug: 'partner2',
                        logo: 'images/partner-logo.png',
                        primaryColor: '#2d5a27',
                        subtitle: 'Eco Garden Solutions'
                    },
                    'omeya-sin': {
                        name: 'Omeya-SIN',
                        slug: 'omeya-sin',
                        logo: 'images/partner-logo.png',
                        primaryColor: '#1a365d',
                        subtitle: 'Zip Blinds Solutions · Singapore'
                    },
                    'nestopia-chn': {
                        name: 'Nestopia-CHN',
                        slug: 'nestopia-chn',
                        logo: 'images/partner-logo.png',
                        primaryColor: '#7c3aed',
                        subtitle: 'Full Outdoor Living Solutions · China'
                    },
                    'default': {
                        name: 'Greenscape Builders',
                        slug: 'default',
                        logo: 'images/partner-logo.png',
                        primaryColor: '#222222',
                        subtitle: 'Partner Sign In'
                    }
                };
                
                currentTenant = tenants[slug] || tenants['default'];
                applyTenantUI(currentTenant);
                
            } catch (error) {
                console.error('Failed to load tenant config:', error);
                showError('Failed to load tenant config. Please refresh.');
            }
        }

        // Apply tenant UI customization
        function applyTenantUI(tenant) {
            document.documentElement.style.setProperty('--primary', tenant.primaryColor);
            document.documentElement.style.setProperty('--primary-hover', adjustColor(tenant.primaryColor, -20));
            
            document.getElementById('tenantLogo').src = tenant.logo;
            document.getElementById('tenantName').textContent = tenant.name;
            document.getElementById('tenantSubtitle').textContent = tenant.subtitle;
            document.title = `${tenant.name} - Sign In`;

            // Sync the company dropdown to match
            const sel = document.getElementById('companySelect');
            if (sel) {
                // Map partner1 → default for dropdown (they share the same Greenscape entry)
                const val = (tenant.slug === 'partner1') ? 'default' : tenant.slug;
                sel.value = val;
            }
            
            // Hide loading
            document.getElementById('loadingOverlay').classList.remove('show');
        }

        // Helper: Adjust color brightness
        function adjustColor(color, amount) {
            const num = parseInt(color.replace('#', ''), 16);
            const r = Math.min(255, Math.max(0, (num >> 16) + amount));
            const g = Math.min(255, Math.max(0, ((num >> 8) & 0x00FF) + amount));
            const b = Math.min(255, Math.max(0, (num & 0x00FF) + amount));
            return `#${((r << 16) | (g << 8) | b).toString(16).padStart(6, '0')}`;
        }

        // Show error message
        function showError(message) {
            const errorEl = document.getElementById('errorMessage');
            document.getElementById('errorText').textContent = message;
            errorEl.classList.add('show');
            
            setTimeout(() => {
                errorEl.classList.remove('show');
            }, 5000);
        }

        // Toggle password visibility
        document.getElementById('togglePassword').addEventListener('click', function() {
            const passwordInput = document.getElementById('password');
            const type = passwordInput.type === 'password' ? 'text' : 'password';
            passwordInput.type = type;
            this.classList.toggle('fa-eye');
            this.classList.toggle('fa-eye-slash');
        });

        // ===== Authentication Logic =====
        // Rule: Only accept @ai-nestopia.com emails
        // Rule: Passcode for xyz@ai-nestopia.com must be xyz123!
        function validateCredentials(email, password) {
            const emailLower = email.toLowerCase().trim();
            const suffix = '@ai-nestopia.com';

            // Check email suffix
            if (!emailLower.endsWith(suffix)) {
                return { valid: false, error: 'Access denied. Only @ai-nestopia.com email addresses are authorized.' };
            }

            // Extract prefix (the part before @)
            const prefix = emailLower.slice(0, emailLower.indexOf('@'));
            if (!prefix || prefix.length === 0) {
                return { valid: false, error: 'Invalid email format.' };
            }

            // Expected passcode: {prefix}123!
            const expectedPasscode = prefix + '123!';
            if (password !== expectedPasscode) {
                return { valid: false, error: 'Invalid credentials. Please check your email and passcode.' };
            }

            return { valid: true, prefix: prefix, email: emailLower };
        }

        // Handle login form submission
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const rememberMe = document.getElementById('rememberMe').checked;
            const loginBtn = document.getElementById('loginBtn');
            
            // Basic validation
            if (!email || !password) {
                showError('Please enter email and passcode.');
                return;
            }
            
            // Show loading
            loginBtn.classList.add('loading');
            loginBtn.disabled = true;
            
            // Simulate brief network delay for UX
            await new Promise(resolve => setTimeout(resolve, 800));

            // Validate credentials
            const result = validateCredentials(email, password);
            
            if (!result.valid) {
                showError(result.error);
                loginBtn.classList.remove('loading');
                loginBtn.disabled = false;
                return;
            }

            // Authentication successful — generate token and store
            const authToken = 'nestopia-auth-' + result.prefix + '-' + Date.now();
            const authData = {
                token: authToken,
                email: result.email,
                prefix: result.prefix,
                tenant: currentTenant?.slug || 'default',
                loginTime: new Date().toISOString()
            };
            
            // Persist credentials based on "Remember me" choice
            // Remember me = localStorage (survives browser close)
            // No remember = sessionStorage (clears on browser close)
            const storage = rememberMe ? localStorage : sessionStorage;
            storage.setItem('auth_token', authToken);
            storage.setItem('auth_data', JSON.stringify(authData));
            storage.setItem('tenant_slug', authData.tenant);

            // If "Remember me" is checked, also store in localStorage explicitly
            // so the credential persists across sessions
            if (rememberMe) {
                localStorage.setItem('auth_remember', 'true');
            }
            
            // Redirect to dashboard
            window.location.href = 'company-operations.html';
        });

        // Handle forgot passcode
        document.getElementById('forgotPassword').addEventListener('click', function(e) {
            e.preventDefault();
            alert('Please contact your Nestopia administrator to reset your passcode.');
        });

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('loadingOverlay').classList.add('show');
            loadTenantConfig();

            // Switch tenant when company dropdown changes
            document.getElementById('companySelect').addEventListener('change', function() {
                loadTenantConfig(this.value);
            });
        });
    </script>
</body>
</html>
