<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DashScope CORS 测试</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #1a1a2e;
            color: #eee;
        }
        .container {
            background: #16213e;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        h1 { color: #00d9ff; margin-bottom: 10px; }
        .subtitle { color: #888; margin-bottom: 30px; }
        label { display: block; margin-bottom: 8px; color: #aaa; }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid #333;
            border-radius: 8px;
            background: #0f0f23;
            color: #fff;
            font-size: 14px;
            box-sizing: border-box;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        button:disabled {
            background: #555;
            cursor: not-allowed;
            transform: none;
        }
        #result {
            margin-top: 30px;
            padding: 20px;
            background: #0f0f23;
            border-radius: 8px;
            border-left: 4px solid #667eea;
            white-space: pre-wrap;
            font-family: 'Monaco', 'Consolas', monospace;
            font-size: 13px;
            max-height: 400px;
            overflow-y: auto;
        }
        .success { border-left-color: #00d26a !important; }
        .error { border-left-color: #ff6b6b !important; }
        .status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 15px;
        }
        .status.testing { background: #f0ad4e; color: #000; }
        .status.cors-ok { background: #00d26a; color: #000; }
        .status.cors-fail { background: #ff6b6b; color: #fff; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔬 DashScope CORS 测试</h1>
        <p class="subtitle">测试浏览器能否直接调用 DashScope API（无需后端代理）</p>
        
        <label for="apiKey">DashScope API Key:</label>
        <input type="password" id="apiKey" placeholder="sk-xxxxxxxxxxxxxxxx">
        
        <button id="testBtn" onclick="testCORS()">开始测试</button>
        
        <div id="result" style="display: none;"></div>
    </div>

    <script>
        async function testCORS() {
            const apiKey = document.getElementById('apiKey').value.trim();
            const resultDiv = document.getElementById('result');
            const testBtn = document.getElementById('testBtn');
            
            if (!apiKey) {
                alert('请输入 API Key');
                return;
            }
            
            resultDiv.style.display = 'block';
            resultDiv.className = '';
            resultDiv.innerHTML = '<span class="status testing">⏳ 测试中...</span>\n正在从浏览器直接调用 DashScope API...';
            testBtn.disabled = true;
            testBtn.textContent = '测试中...';
            
            // 简单的测试请求 - 使用一个小的测试 prompt
            const testPayload = {
                model: 'qwen-vl-max',  // 使用较轻量的模型测试
                input: {
                    messages: [
                        {
                            role: 'user',
                            content: [
                                { text: 'Hello, this is a CORS test. Please respond with "OK".' }
                            ]
                        }
                    ]
                }
            };
            
            try {
                console.log('开始 CORS 测试...');
                
                const response = await fetch(
                    'https://dashscope.aliyuncs.com/api/v1/services/aigc/multimodal-generation/generation',
                    {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${apiKey}`
                        },
                        body: JSON.stringify(testPayload)
                    }
                );
                
                const data = await response.json();
                
                if (response.ok) {
                    resultDiv.className = 'success';
                    resultDiv.innerHTML = `<span class="status cors-ok">✅ CORS 支持!</span>

🎉 好消息！DashScope API 支持浏览器直接调用！

这意味着：
• 无需后端代理（如 Cloudflare Workers）
• 可以直接部署到 Cloudflare Pages
• 前端直接调用 API，用户输入自己的 API Key

API 响应:
${JSON.stringify(data, null, 2)}`;
                } else {
                    // API 返回了错误，但请求成功到达（说明 CORS OK）
                    resultDiv.className = 'success';
                    resultDiv.innerHTML = `<span class="status cors-ok">✅ CORS 支持!</span>

虽然 API 返回了错误（可能是模型/参数问题），但请求成功到达服务器！
这说明 CORS 是支持的，可以直接从浏览器调用。

API 响应:
${JSON.stringify(data, null, 2)}`;
                }
                
            } catch (error) {
                console.error('CORS 测试失败:', error);
                
                // 检查是否是 CORS 错误
                if (error.message.includes('CORS') || 
                    error.message.includes('NetworkError') ||
                    error.message.includes('Failed to fetch') ||
                    error.name === 'TypeError') {
                    resultDiv.className = 'error';
                    resultDiv.innerHTML = `<span class="status cors-fail">❌ CORS 不支持</span>

DashScope API 不支持浏览器直接调用（CORS 被阻止）

解决方案：
1. 使用 Cloudflare Workers 作为免费 API 代理（推荐）
2. 使用其他支持 CORS 的 API 代理服务

错误详情:
${error.name}: ${error.message}`;
                } else {
                    resultDiv.className = 'error';
                    resultDiv.innerHTML = `<span class="status cors-fail">❌ 请求失败</span>

错误: ${error.message}

请检查:
1. API Key 是否正确
2. 网络连接是否正常`;
                }
            }
            
            testBtn.disabled = false;
            testBtn.textContent = '重新测试';
        }
    </script>
</body>
</html>
